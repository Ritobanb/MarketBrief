services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: marketbrief
      POSTGRES_USER: marketbrief
      POSTGRES_PASSWORD: marketbrief
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketbrief -d marketbrief"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - marketbrief_postgres:/var/lib/postgresql/data

volumes:
  marketbrief_postgres:
